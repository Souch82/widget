<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formation Progress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      padding: 16px;
      color: #323338;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: #e6e9ef;
      color: #676879;
      transition: all 0.2s;
    }
    .tab.active { background: #0073ea; color: white; }
    .tab:hover:not(.active) { background: #d0d4e4; }
    .chart-wrapper {
      background: white;
      border-radius: 8px;
      padding: 20px 20px 60px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      position: relative;
      height: 340px;
    }
    .state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #676879;
      font-size: 13px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e6e9ef;
      border-top-color: #0073ea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #676879;
    }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    canvas { display: none; }

    /* Avatars sous le graphe */
    .avatars-row {
      display: flex;
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      pointer-events: none;
    }
    .avatar-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .avatar-initials {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0073ea;
      color: white;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab active" onclick="switchBoard('MOP', this)">MOP</button>
    <button class="tab" onclick="switchBoard('Procédures', this)">Procédures</button>
    <button class="tab" onclick="switchBoard('Formation Equipement', this)">Formation</button>
  </div>

  <div class="chart-wrapper">
    <div class="state" id="state">
      <div class="spinner"></div>
      <span>Chargement...</span>
    </div>
    <canvas id="chart"></canvas>
    <div class="avatars-row" id="avatars-row"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00c875;"></div>Formé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fdab3d;"></div>En cours</div>
    <div class="legend-item"><div class="legend-dot" style="background:#df2f4a;"></div>Non commencé</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM43IyR7kG27IvPug5s2-rEsIQfPCOuL2KIvwI7fzVRpFhn5j4_mj_IhTXLoTtnVR6/exec";

    let chart        = null;
    let allData      = {};
    let currentBoard = "MOP";

    // ─── CHARGEMENT ──────────────────────────────────────────

    async function loadAllData() {
      showState("loading");
      try {
        const boards = ["MOP", "Procédures", "Formation Equipement"];
        const results = await Promise.all(
          boards.map(b =>
            fetch(`${APPS_SCRIPT_URL}?board=${encodeURIComponent(b)}`)
              .then(r => r.json())
              .then(data => ({ [b]: data }))
          )
        );
        allData = Object.assign({}, ...results);
        renderChart(currentBoard);
      } catch (err) {
        showState("error", "Erreur : " + err.message);
      }
    }

    // ─── RENDU ───────────────────────────────────────────────

    function renderChart(boardName) {
      const data = allData[boardName];
      if (!data || !data.employees || data.employees.length === 0) {
        showState("empty", "Aucune donnée pour " + boardName);
        renderAvatars([]);
        return;
      }

      hideState();

      const employees = data.employees;
      const labels    = employees.map(e => e.name.split(" ")[0]); // prénom seulement
      const formes    = employees.map(e => e.forme);
      const enCours   = employees.map(e => e.enCours);
      const nonCom    = employees.map(e => e.nonCommence);

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById("chart").getContext("2d"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "Formé",        data: formes,  backgroundColor: "#00c875", borderRadius: 4, borderSkipped: false },
            { label: "En cours",     data: enCours, backgroundColor: "#fdab3d", borderRadius: 4, borderSkipped: false },
            { label: "Non commencé", data: nonCom,  backgroundColor: "#df2f4a", borderRadius: 4, borderSkipped: false }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw} items` } }
          },
          scales: {
            x: {
              stacked: true,
              grid: { display: false },
              ticks: { display: false } // on cache les labels texte, on met les avatars
            },
            y: {
              stacked: true,
              beginAtZero: true,
              ticks: { stepSize: 1 },
              grid: { color: "#f0f0f0" }
            }
          },
          onClick: (_, elements) => {
            if (elements.length > 0) showDetail(employees[elements[0].index]);
          },
          animation: {
            onComplete: () => renderAvatars(employees)
          }
        }
      });
    }

    // ─── AVATARS ─────────────────────────────────────────────

    function renderAvatars(employees) {
      const avatarsRow = document.getElementById("avatars-row");
      avatarsRow.innerHTML = "";

      if (!chart || employees.length === 0) return;

      const meta      = chart.getDatasetMeta(0);
      const canvas    = document.getElementById("chart");
      const canvasRect = canvas.getBoundingClientRect();
      const wrapRect   = canvas.parentElement.getBoundingClientRect();

      employees.forEach((emp, i) => {
        const bar = meta.data[i];
        if (!bar) return;

        const x    = bar.x;
        const slot = document.createElement("div");
        slot.className = "avatar-slot";
        slot.style.position = "absolute";
        slot.style.left = (x - 14 + (canvas.offsetLeft || 0)) + "px";

        if (emp.photo) {
          const img = document.createElement("img");
          img.className = "avatar";
          img.src = emp.photo;
          img.alt = emp.name;
          img.onerror = () => {
            img.replaceWith(makeInitials(emp.name));
          };
          slot.appendChild(img);
        } else {
          slot.appendChild(makeInitials(emp.name));
        }

        avatarsRow.appendChild(slot);
      });
    }

    function makeInitials(name) {
      const parts    = name.trim().split(" ");
      const initials = parts.length >= 2
        ? parts[0][0] + parts[1][0]
        : parts[0].slice(0, 2);
      const div = document.createElement("div");
      div.className = "avatar-initials";
      div.textContent = initials.toUpperCase();
      return div;
    }

    // ─── DÉTAIL ───────────────────────────────────────────────

    function showDetail(emp) {
      const t = emp.total || 1;
      alert(
        `${emp.name} — ${currentBoard}\n\n` +
        `✅ Formé        : ${emp.forme} (${Math.round(emp.forme/t*100)}%)\n` +
        `🟡 En cours     : ${emp.enCours} (${Math.round(emp.enCours/t*100)}%)\n` +
        `🔴 Non commencé : ${emp.nonCommence} (${Math.round(emp.nonCommence/t*100)}%)\n` +
        `─────────────────\nTotal : ${emp.total} items`
      );
    }

    // ─── NAVIGATION ──────────────────────────────────────────

    function switchBoard(boardName, btn) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      currentBoard = boardName;
      if (allData[boardName]) {
        renderChart(boardName);
      } else {
        showState("loading");
      }
    }

    // ─── ÉTATS UI ────────────────────────────────────────────

    function showState(type, msg) {
      const state  = document.getElementById("state");
      const canvas = document.getElementById("chart");
      canvas.style.display = "none";
      state.style.display  = "flex";
      document.getElementById("avatars-row").innerHTML = "";
      state.innerHTML = type === "loading"
        ? '<div class="spinner"></div><span>Chargement...</span>'
        : `<span>${msg || "Aucune donnée"}</span>`;
    }

    function hideState() {
      document.getElementById("state").style.display = "none";
      document.getElementById("chart").style.display = "block";
    }

    // ─── REFRESH AUTO ────────────────────────────────────────
    setInterval(loadAllData, 60000);
    loadAllData();
  </script>

</body>
</html>
